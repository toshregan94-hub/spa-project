<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="search-container">
        <h1>Wordly</h1>
        
        <form id="search-form">
            <input type="text" id="search-input" placeholder="What are you looking for?">
             
            <button type="submit" id="search-button">Search</button>
        </form>

        <section id="result-display">
            <p class="placeholder-text">Your results will appear here...</p>
        </section>
    </div>

    <script src="script.js"></script>
    
</body>
<footer Copyright="2026">© 2026 Wordly. All rights reserved.</footer>
</html>
